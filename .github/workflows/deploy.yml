name: CI/CD Production Build Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Flake8 Lint Check
        run: |
          cd backend
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Basic Health Checks Tests
        run: |
          cd backend
          # Run python module imports verification check
          python -c "import app.main; print('API compilation verified')"

  frontend-lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: ESLint Check
        run: npm run lint

      - name: Production Web Build Test
        run: npm run build
